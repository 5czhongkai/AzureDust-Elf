    depends_on: [shipinhao_editor_software_import_executor]
    parallel_group: editor_software_real_runner_sandbox
    outputs:
      - assets/shipinhao/edit/software_real_runner_sandbox/runner_sandbox_manifest.json
      - assets/shipinhao/edit/software_real_runner_sandbox/runner_environment_snapshot.json
      - assets/shipinhao/edit/software_real_runner_sandbox/runner_launch_plan.json
      - assets/shipinhao/edit/software_real_runner_sandbox/runner_command_preview.json
      - assets/shipinhao/edit/software_real_runner_sandbox/runner_audit_log.json
      - assets/shipinhao/edit/software_real_runner_sandbox/runner_evidence_manifest.json
      - assets/shipinhao/edit/software_real_runner_sandbox/human_real_run_approval_request.md
      - assets/shipinhao/edit/software_real_runner_sandbox/README.md

  - id: shipinhao_editor_software_run_evidence
    agent: editor-software-run-evidence-agent
    platform: shipinhao
    depends_on: [shipinhao_editor_software_real_runner_sandbox]
    parallel_group: editor_software_run_evidence
    outputs:
      - assets/shipinhao/edit/software_run_evidence/real_run_evidence_manifest.json
