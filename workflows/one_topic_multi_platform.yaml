    depends_on: [shipinhao_editor_replacement_execution]
    parallel_group: editor_project_mutation_sandbox
    outputs:
      - assets/shipinhao/edit/mutation_sandbox/mutation_manifest.json
      - assets/shipinhao/edit/mutation_sandbox/patched_project.fcpxml
      - assets/shipinhao/edit/mutation_sandbox/mutation_diff.json
      - assets/shipinhao/edit/mutation_sandbox/rollback_manifest.json
      - assets/shipinhao/edit/mutation_sandbox/mutation_audit_log.json
      - assets/shipinhao/edit/mutation_sandbox/human_final_review_checklist.md
