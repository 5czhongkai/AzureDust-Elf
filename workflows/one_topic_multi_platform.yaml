      - assets/douyin/edit/mutation_sandbox/mutation_diff.json
      - assets/douyin/edit/mutation_sandbox/rollback_manifest.json
      - assets/douyin/edit/mutation_sandbox/mutation_audit_log.json
      - assets/douyin/edit/mutation_sandbox/human_final_review_checklist.md
      - assets/douyin/edit/mutation_sandbox/README.md

  - id: douyin_editor_software_import_executor
    agent: editor-software-import-executor-agent
