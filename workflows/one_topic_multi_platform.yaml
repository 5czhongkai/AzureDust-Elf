      - assets/shipinhao/edit/software_run_evidence/rollback_decision_report.json
      - assets/shipinhao/edit/software_run_evidence/post_launch_evidence_checklist.md
      - assets/shipinhao/edit/software_run_evidence/README.md

  - id: bilibili_editor_project_mutation_sandbox
    agent: editor-project-mutation-sandbox-agent
    platform: bilibili
    depends_on: [bilibili_editor_replacement_execution]
