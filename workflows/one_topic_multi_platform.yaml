id: one_topic_multi_platform
name: One Topic Multi Platform Content Package
version: 0.0.0
description: Generate WeChat, Xiaohongshu, Douyin, Shipinhao, and Bilibili content packages from one topic.
inputs:
  - brief.topic
  - brief.audience
  - brief.goal
  - brief.constraints
steps:
  - id: research
    agent: research-agent
    depends_on: []
    outputs:
      - research_report.md
      - sources.json

  - id: topic_angles
    agent: topic-agent
    depends_on: [research]
    outputs:
      - angle_pack.json

  - id: master_outline
    agent: outline-agent
    depends_on: [topic_angles]
    outputs:
      - master_outline.md

  - id: visual_assets
    agent: asset-agent
    depends_on: [master_outline]
    outputs:
      - asset_plan.json
      - cover_prompts.md
      - assets/asset_generation_tasks.json
      - assets/media_asset_manifest.json
      - assets/asset_ingest_guide.md

  - id: douyin_cover_image
    agent: cover-image-agent
    platform: douyin
    depends_on: [visual_assets]
    parallel_group: media_assets
    outputs:
      - assets/douyin/cover/cover.png
      - assets/douyin/cover/cover_metadata.json

  - id: shipinhao_cover_image
    agent: cover-image-agent
    platform: shipinhao
    depends_on: [visual_assets]
    parallel_group: media_assets
    outputs:
      - assets/shipinhao/cover/cover.png
      - assets/shipinhao/cover/cover_metadata.json

  - id: bilibili_cover_image
    agent: cover-image-agent
    platform: bilibili
    depends_on: [visual_assets]
    parallel_group: media_assets
    outputs:
      - assets/bilibili/cover/cover.png
      - assets/bilibili/cover/cover_metadata.json

  - id: wechat_article
    agent: wechat-article-agent
    platform: wechat
    depends_on: [master_outline]
    parallel_group: platform_outputs
    outputs:
      - wechat/article.md
      - wechat/title_options.json

  - id: xiaohongshu_note
    agent: xiaohongshu-note-agent
    platform: xiaohongshu
    depends_on: [master_outline]
    parallel_group: platform_outputs
    outputs:
      - xiaohongshu/note.json
      - xiaohongshu/cover_prompt.md

  - id: douyin_video
    agent: douyin-video-agent
    platform: douyin
    depends_on: [master_outline, visual_assets, douyin_cover_image]
    parallel_group: platform_outputs
    outputs:
      - douyin/script.md
      - douyin/storyboard.json
      - douyin/subtitles.srt
      - douyin/shot_list.json
      - douyin/broll_list.json
      - douyin/cover_prompt.md

  - id: shipinhao_video
    agent: shipinhao-video-agent
    platform: shipinhao
    depends_on: [master_outline, visual_assets, shipinhao_cover_image]
    parallel_group: platform_outputs
    outputs:
      - shipinhao/script.md
      - shipinhao/storyboard.json
      - shipinhao/subtitles.srt
      - shipinhao/cover_prompt.md
      - shipinhao/shot_list.json
      - shipinhao/broll_list.json

  - id: bilibili_video
    agent: bilibili-video-agent
    platform: bilibili
    depends_on: [master_outline, visual_assets, bilibili_cover_image]
    parallel_group: platform_outputs
    outputs:
      - bilibili/script.md
      - bilibili/chapters.json
      - bilibili/description.md
      - bilibili/storyboard.json
      - bilibili/subtitles.srt
      - bilibili/shot_list.json
      - bilibili/broll_list.json
      - bilibili/cover_prompt.md

  - id: douyin_storyboard_preview
    agent: storyboard-preview-agent
    platform: douyin
    depends_on: [visual_assets, douyin_video]
    parallel_group: storyboard_previews
    outputs:
      - assets/douyin/storyboard/storyboard_preview.png
      - assets/douyin/storyboard/storyboard_preview_metadata.json
      - assets/douyin/storyboard/douyin_01.png
      - assets/douyin/storyboard/douyin_02.png
      - assets/douyin/storyboard/douyin_03.png
      - assets/douyin/storyboard/douyin_04.png
      - assets/douyin/storyboard/douyin_05.png
      - assets/douyin/storyboard/douyin_06.png

  - id: shipinhao_storyboard_preview
    agent: storyboard-preview-agent
    platform: shipinhao
    depends_on: [visual_assets, shipinhao_video]
    parallel_group: storyboard_previews
    outputs:
      - assets/shipinhao/storyboard/storyboard_preview.png
      - assets/shipinhao/storyboard/storyboard_preview_metadata.json
      - assets/shipinhao/storyboard/shipinhao_01.png
      - assets/shipinhao/storyboard/shipinhao_02.png
      - assets/shipinhao/storyboard/shipinhao_03.png
      - assets/shipinhao/storyboard/shipinhao_04.png
      - assets/shipinhao/storyboard/shipinhao_05.png
      - assets/shipinhao/storyboard/shipinhao_06.png

  - id: bilibili_storyboard_preview
    agent: storyboard-preview-agent
    platform: bilibili
    depends_on: [visual_assets, bilibili_video]
    parallel_group: storyboard_previews
    outputs:
      - assets/bilibili/storyboard/storyboard_preview.png
      - assets/bilibili/storyboard/storyboard_preview_metadata.json
      - assets/bilibili/storyboard/bili_01.png
      - assets/bilibili/storyboard/bili_02.png
      - assets/bilibili/storyboard/bili_03.png
      - assets/bilibili/storyboard/bili_04.png
      - assets/bilibili/storyboard/bili_05.png
      - assets/bilibili/storyboard/bili_06.png

  - id: douyin_asset_materialization
    agent: asset-materialization-agent
    platform: douyin
    depends_on: [visual_assets, douyin_video]
    parallel_group: asset_materialization
    outputs:
      - assets/douyin/materials/material_manifest.json
      - assets/douyin/materials/README.md
      - assets/douyin/materials/workflow_board_reference.png
      - assets/douyin/materials/task_ledger_closeup_reference.png
      - assets/douyin/materials/vertical_caption_overlay_reference.png

  - id: shipinhao_asset_materialization
    agent: asset-materialization-agent
    platform: shipinhao
    depends_on: [visual_assets, shipinhao_video]
    parallel_group: asset_materialization
    outputs:
      - assets/shipinhao/materials/material_manifest.json
      - assets/shipinhao/materials/README.md
      - assets/shipinhao/materials/workflow_board_reference.png
      - assets/shipinhao/materials/task_ledger_closeup_reference.png
      - assets/shipinhao/materials/vertical_caption_overlay_reference.png

  - id: bilibili_asset_materialization
    agent: asset-materialization-agent
    platform: bilibili
    depends_on: [visual_assets, bilibili_video]
    parallel_group: asset_materialization
    outputs:
      - assets/bilibili/materials/material_manifest.json
      - assets/bilibili/materials/README.md
      - assets/bilibili/materials/workflow_board_reference.png
      - assets/bilibili/materials/task_ledger_closeup_reference.png
      - assets/bilibili/materials/chapter_timeline_reference.png

  - id: douyin_subtitle_timing
    agent: subtitle-timing-agent
    platform: douyin
    depends_on: [douyin_video, douyin_storyboard_preview]
    parallel_group: subtitle_timing
    outputs:
      - douyin/timed_subtitles.json
      - douyin/timed_subtitles.srt

  - id: shipinhao_subtitle_timing
    agent: subtitle-timing-agent
    platform: shipinhao
    depends_on: [shipinhao_video, shipinhao_storyboard_preview]
    parallel_group: subtitle_timing
    outputs:
      - shipinhao/timed_subtitles.json
      - shipinhao/timed_subtitles.srt

  - id: bilibili_subtitle_timing
    agent: subtitle-timing-agent
    platform: bilibili
    depends_on: [bilibili_video, bilibili_storyboard_preview]
    parallel_group: subtitle_timing
    outputs:
      - bilibili/timed_subtitles.json
      - bilibili/timed_subtitles.srt

  - id: douyin_voiceover_tts
    agent: voiceover-tts-agent
    platform: douyin
    depends_on: [douyin_subtitle_timing]
    parallel_group: voiceover_tts
    outputs:
      - assets/douyin/voiceover/voiceover.wav
      - assets/douyin/voiceover/voiceover_manifest.json

  - id: shipinhao_voiceover_tts
    agent: voiceover-tts-agent
    platform: shipinhao
    depends_on: [shipinhao_subtitle_timing]
    parallel_group: voiceover_tts
    outputs:
      - assets/shipinhao/voiceover/voiceover.wav
      - assets/shipinhao/voiceover/voiceover_manifest.json

  - id: bilibili_voiceover_tts
    agent: voiceover-tts-agent
    platform: bilibili
    depends_on: [bilibili_subtitle_timing]
    parallel_group: voiceover_tts
    outputs:
      - assets/bilibili/voiceover/voiceover.wav
      - assets/bilibili/voiceover/voiceover_manifest.json

  - id: douyin_licensed_media_ingest
    agent: licensed-media-ingest-agent
    platform: douyin
    depends_on: [douyin_asset_materialization]
    parallel_group: licensed_media_ingest
    outputs:
      - assets/douyin/licensed_media/ingest_manifest.json
      - assets/douyin/licensed_media/README.md
      - assets/douyin/licensed_media/review_handoff.md

  - id: douyin_licensed_media_proxy
    agent: licensed-media-proxy-agent
    platform: douyin
    depends_on: [douyin_licensed_media_ingest]
    parallel_group: licensed_media_proxy
    outputs:
      - assets/douyin/licensed_media/proxy_manifest.json
      - assets/douyin/licensed_media/replacement_suggestions.json
      - assets/douyin/licensed_media/proxy/README.md

  - id: shipinhao_licensed_media_ingest
    agent: licensed-media-ingest-agent
    platform: shipinhao
    depends_on: [shipinhao_asset_materialization]
    parallel_group: licensed_media_ingest
    outputs:
      - assets/shipinhao/licensed_media/ingest_manifest.json
      - assets/shipinhao/licensed_media/README.md
      - assets/shipinhao/licensed_media/review_handoff.md

  - id: shipinhao_licensed_media_proxy
    agent: licensed-media-proxy-agent
    platform: shipinhao
    depends_on: [shipinhao_licensed_media_ingest]
    parallel_group: licensed_media_proxy
    outputs:
      - assets/shipinhao/licensed_media/proxy_manifest.json
      - assets/shipinhao/licensed_media/replacement_suggestions.json
      - assets/shipinhao/licensed_media/proxy/README.md

  - id: bilibili_licensed_media_ingest
    agent: licensed-media-ingest-agent
    platform: bilibili
    depends_on: [bilibili_asset_materialization]
    parallel_group: licensed_media_ingest
    outputs:
      - assets/bilibili/licensed_media/ingest_manifest.json
      - assets/bilibili/licensed_media/README.md
      - assets/bilibili/licensed_media/review_handoff.md

  - id: bilibili_licensed_media_proxy
    agent: licensed-media-proxy-agent
    platform: bilibili
    depends_on: [bilibili_licensed_media_ingest]
    parallel_group: licensed_media_proxy
    outputs:
      - assets/bilibili/licensed_media/proxy_manifest.json
      - assets/bilibili/licensed_media/replacement_suggestions.json
      - assets/bilibili/licensed_media/proxy/README.md

  - id: douyin_edit_project
    agent: edit-project-agent
    platform: douyin
    depends_on: [douyin_storyboard_preview, douyin_voiceover_tts, douyin_asset_materialization, douyin_licensed_media_ingest, douyin_licensed_media_proxy]
    parallel_group: edit_projects
    outputs:
      - assets/douyin/edit/edit_timeline.json
      - assets/douyin/edit/edit_manifest.json
      - assets/douyin/edit/draft_cut.edl

  - id: shipinhao_edit_project
    agent: edit-project-agent
    platform: shipinhao
    depends_on: [shipinhao_storyboard_preview, shipinhao_voiceover_tts, shipinhao_asset_materialization, shipinhao_licensed_media_ingest, shipinhao_licensed_media_proxy]
    parallel_group: edit_projects
    outputs:
      - assets/shipinhao/edit/edit_timeline.json
      - assets/shipinhao/edit/edit_manifest.json
      - assets/shipinhao/edit/draft_cut.edl

  - id: bilibili_edit_project
    agent: edit-project-agent
    platform: bilibili
    depends_on: [bilibili_storyboard_preview, bilibili_voiceover_tts, bilibili_asset_materialization, bilibili_licensed_media_ingest, bilibili_licensed_media_proxy]
    parallel_group: edit_projects
    outputs:
      - assets/bilibili/edit/edit_timeline.json
      - assets/bilibili/edit/edit_manifest.json
      - assets/bilibili/edit/draft_cut.edl

  - id: douyin_export_project
    agent: export-project-agent
    platform: douyin
    depends_on: [douyin_edit_project]
    parallel_group: export_projects
    outputs:
      - assets/douyin/edit/project.fcpxml
      - assets/douyin/edit/import_readme.md
      - assets/douyin/edit/offline_media_report.json
      - assets/douyin/edit/export_manifest.json

  - id: shipinhao_export_project
    agent: export-project-agent
    platform: shipinhao
    depends_on: [shipinhao_edit_project]
    parallel_group: export_projects
    outputs:
      - assets/shipinhao/edit/project.fcpxml
      - assets/shipinhao/edit/import_readme.md
      - assets/shipinhao/edit/offline_media_report.json
      - assets/shipinhao/edit/export_manifest.json

  - id: bilibili_export_project
    agent: export-project-agent
    platform: bilibili
    depends_on: [bilibili_edit_project]
    parallel_group: export_projects
    outputs:
      - assets/bilibili/edit/project.fcpxml
      - assets/bilibili/edit/import_readme.md
      - assets/bilibili/edit/offline_media_report.json
      - assets/bilibili/edit/export_manifest.json

  - id: douyin_editor_replacement_instructions
    agent: editor-replacement-instructions-agent
    platform: douyin
    depends_on: [douyin_export_project, douyin_licensed_media_proxy]
    parallel_group: editor_replacement_instructions
    outputs:
      - assets/douyin/edit/replacement_instructions/instruction_manifest.json
      - assets/douyin/edit/replacement_instructions/replacement_commands.json
      - assets/douyin/edit/replacement_instructions/editor_import_template.fcpxml
      - assets/douyin/edit/replacement_instructions/human_confirmation_checklist.md
      - assets/douyin/edit/replacement_instructions/README.md

  - id: shipinhao_editor_replacement_instructions
    agent: editor-replacement-instructions-agent
    platform: shipinhao
    depends_on: [shipinhao_export_project, shipinhao_licensed_media_proxy]
    parallel_group: editor_replacement_instructions
    outputs:
      - assets/shipinhao/edit/replacement_instructions/instruction_manifest.json
      - assets/shipinhao/edit/replacement_instructions/replacement_commands.json
      - assets/shipinhao/edit/replacement_instructions/editor_import_template.fcpxml
      - assets/shipinhao/edit/replacement_instructions/human_confirmation_checklist.md
      - assets/shipinhao/edit/replacement_instructions/README.md

  - id: bilibili_editor_replacement_instructions
    agent: editor-replacement-instructions-agent
    platform: bilibili
    depends_on: [bilibili_export_project, bilibili_licensed_media_proxy]
    parallel_group: editor_replacement_instructions
    outputs:
      - assets/bilibili/edit/replacement_instructions/instruction_manifest.json
      - assets/bilibili/edit/replacement_instructions/replacement_commands.json
      - assets/bilibili/edit/replacement_instructions/editor_import_template.fcpxml
      - assets/bilibili/edit/replacement_instructions/human_confirmation_checklist.md
      - assets/bilibili/edit/replacement_instructions/README.md

  - id: douyin_editor_replacement_execution
    agent: editor-replacement-execution-agent
    platform: douyin
    depends_on: [douyin_editor_replacement_instructions]
    parallel_group: editor_replacement_execution
    outputs:
      - assets/douyin/edit/replacement_execution/execution_manifest.json
      - assets/douyin/edit/replacement_execution/execution_plan.json
      - assets/douyin/edit/replacement_execution/execution_audit_log.json
      - assets/douyin/edit/replacement_execution/human_execution_approval_request.md
      - assets/douyin/edit/replacement_execution/README.md

  - id: shipinhao_editor_replacement_execution
    agent: editor-replacement-execution-agent
