      - assets/shipinhao/edit/replacement_execution/execution_plan.json
      - assets/shipinhao/edit/replacement_execution/execution_audit_log.json
      - assets/shipinhao/edit/replacement_execution/human_execution_approval_request.md
      - assets/shipinhao/edit/replacement_execution/README.md

  - id: bilibili_editor_replacement_execution
    agent: editor-replacement-execution-agent
