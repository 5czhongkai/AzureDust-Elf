  - id: shipinhao_editor_software_import_executor
    agent: editor-software-import-executor-agent
    platform: shipinhao
    depends_on: [shipinhao_editor_project_mutation_sandbox]
    parallel_group: editor_software_import_executor
    outputs:
      - assets/shipinhao/edit/software_import_executor/import_executor_manifest.json
      - assets/shipinhao/edit/software_import_executor/import_plan.json
      - assets/shipinhao/edit/software_import_executor/import_commands.json
      - assets/shipinhao/edit/software_import_executor/software_import_audit_log.json
      - assets/shipinhao/edit/software_import_executor/rollback_safety_report.json
