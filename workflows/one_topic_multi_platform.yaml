      - assets/douyin/edit/software_real_runner_sandbox/runner_audit_log.json
      - assets/douyin/edit/software_real_runner_sandbox/runner_evidence_manifest.json
      - assets/douyin/edit/software_real_runner_sandbox/human_real_run_approval_request.md
      - assets/douyin/edit/software_real_runner_sandbox/README.md

  - id: douyin_editor_software_run_evidence
    agent: editor-software-run-evidence-agent
    platform: douyin
    depends_on: [douyin_editor_software_real_runner_sandbox]
    parallel_group: editor_software_run_evidence
