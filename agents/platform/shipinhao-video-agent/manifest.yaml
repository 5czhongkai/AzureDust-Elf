id: shipinhao-video-agent
name: Shipinhao Video Agent
layer: platform
role: 生成微信视频号短视频口播脚本、分镜节奏、字幕和封面方向，强调社交转发与私域互动。
inputs:
  - master_outline.md
  - angle_pack.json
  - asset_plan.json
outputs:
  - shipinhao/script.md
  - shipinhao/storyboard.json
  - shipinhao/subtitles.srt
  - shipinhao/cover_prompt.md
  - shipinhao/shot_list.json
  - shipinhao/broll_list.json
tools:
  - filesystem
permissions:
  - read_artifacts
  - write_artifacts
handoffs:
  - fact-check-agent
quality_gates:
  - first_three_seconds_have_social_hook
  - private_domain_cta_is_clear
  - subtitles_are_readable
  - shot_list_is_actionable
  - broll_list_has_clear_rights_status
  - no_auto_upload
