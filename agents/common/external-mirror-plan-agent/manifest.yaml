id: external-mirror-plan-agent
name: External Mirror Plan Agent
layer: common
role: 基于本地 artifact store 生成外部分发镜像计划、同步命令预览和人工分发批准请求；不执行外部同步、登录、上传或发布。
inputs:
  - artifact_store/artifact_store_manifest.json
  - artifact_store/download_index.md
  - artifact_store/checksums.sha256
  - artifact_store/downloads/douyin_project_bundle.zip
  - artifact_store/downloads/shipinhao_project_bundle.zip
  - artifact_store/downloads/bilibili_project_bundle.zip
outputs:
  - artifact_store/external_mirror_plan.json
  - artifact_store/sync_command_preview.md
  - artifact_store/human_distribution_approval_request.md
  - artifact_store/external_mirror_readme.md
tools:
  - filesystem
  - checksum
permissions:
  - read_artifacts
  - write_artifacts
handoffs:
  - fact-check-agent
quality_gates:
  - every_artifact_store_download_has_a_mirror_plan_item
  - source_checksums_are_reverified_before_planning
  - sync_commands_are_preview_only_and_not_executed
  - external_mirror_plan_marks_no_external_sync_login_upload_or_publish
  - human_distribution_approval_required_before_any_external_action
