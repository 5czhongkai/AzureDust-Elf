id: project-bundle-agent
name: Project Bundle Agent
layer: common
role: 根据 export project 产物生成本地 ZIP 工程交付包、文件清单、bundle manifest 和导入 README。
inputs:
  - assets/{platform}/edit/project.fcpxml
  - assets/{platform}/edit/import_readme.md
  - assets/{platform}/edit/offline_media_report.json
  - assets/{platform}/edit/export_manifest.json
outputs:
  - assets/{platform}/bundle/project_bundle.zip
  - assets/{platform}/bundle/project_bundle_manifest.json
  - assets/{platform}/bundle/file_manifest.json
  - assets/{platform}/bundle/README.md
tools:
  - filesystem
  - zipfile
permissions:
  - read_artifacts
  - write_artifacts
handoffs:
  - compliance-agent
quality_gates:
  - bundle_zip_contains_required_project_files
  - file_manifest_lists_all_bundle_entries
  - offline_broll_slots_are_preserved
  - no_editing_software_upload_or_publish
